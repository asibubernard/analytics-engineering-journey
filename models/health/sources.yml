version: 2

sources:
  - name: cms_omop
    database: bigquery-public-data
    schema: cms_synthetic_patient_data_omop
    config:
      freshness:
        warn_after: {count: 365, period: day}
        error_after: {count: 730, period: day}
      loaded_at_field: NULL # Public dataset has no load timestamp; freshness checks not applicable
    tables:
      - name: person 
      - name: procedure_occurrence # (fact-replace visit_occurrence)
      - name: condition_occurrence  # fact
      - name: cost # fact, filtered to procedure domain (cost for procedure)
      - name: concept # dimension (this is going to give names)
  

